<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Nocturnal Architect | Portfolio</title>
    <meta
      name="description"
      content="A cinematic full-stack developer portfolio blending architectural precision with high-performance product thinking."
    />
    <script>
      (function () {
        var storageKey = "portfolio-theme";
        var root = document.documentElement;
        var theme = "dark";

        try {
          var storedTheme = window.localStorage.getItem(storageKey);

          if (storedTheme === "light" || storedTheme === "dark") {
            theme = storedTheme;
          } else if (
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches
          ) {
            theme = "light";
          }
        } catch {
          if (
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches
          ) {
            theme = "light";
          }
        }

        root.dataset.theme = theme;
        root.style.colorScheme = theme;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
